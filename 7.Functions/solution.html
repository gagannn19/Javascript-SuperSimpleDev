<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solution</title>
</head>
<body>

  <script>
    function greet(name) {
      if(!name) {
        console.log("Hello there!");
      }
      else {
        console.log(`Hello ${name}`);
      }
    }

    function convertToFahrenheit(celcius) {
      return ((celcius * (9/5)) + 32);
    }

    function convertToCelcius(fahrenheit) {
      return ((fahrenheit - 32) * (5/9));
    }

    function convertTemperature(degree, unit) {
      if(unit === 'C') {
        return (convertToFahrenheit(degree)+'F')
      }
      if(unit === 'F') {
        return (convertToCelcius(degree)+'C')
      }
    }

    function convertLength(length, from, to) {
      if(from === 'km' && to === 'miles') {
        console.log(length/1.6);
      }
      if(from === 'miles' && to === 'km') {
        console.log(length * 1.6);
      }
      if(from === 'km' && to === 'km') {
        console.log(length);
      }
      if(from === 'miles' && to === 'miles') {
        console.log(length);
      }

      if(from === 'km' && to === 'feet') {
        console.log(length * 3281);
      }
      if(from === 'miles' && to === 'feet') {
        console.log(length * 5280);
      }
      if(from === 'feet' && to === 'km') {
        console.log(length / 3281);
      }
      if(from === 'feet' && to === 'miles') {
        console.log(length / 5280);
      }

      if(from != 'km' && from != 'miles' && from != 'feet') {
        console.log(`Invalid Unit ${from}`)
      }
      else if(to != 'km' && to != 'miles' && to != 'feet') {
        console.log(`Invalid Unit ${to}`)
      }
    }

    greet("gagan");
    greet("prashant");
    greet("meerabai");
    greet();

    var fahrenheit = convertToFahrenheit(25);
    console.log(fahrenheit);

    var celcius = convertToCelcius(86);
    console.log(celcius);

    var temp = convertTemperature(25, 'C')
    console.log(temp);
    var temp = convertTemperature(86, 'F')
    console.log(temp);

    convertLength(50, 'miles', 'km');
    convertLength(32, 'km', 'miles');
    convertLength(50, 'km', 'km');
    convertLength(5, 'miles', 'km');
    convertLength(5, 'miles', 'feet');
    convertLength(5, 'km', 'feet');
    convertLength(5, 'lbs', 'lbs');




  </script>
</body>
</html>
