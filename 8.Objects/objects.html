    // string can also have properties. But how string have prooperties like objects.
    // By auto-boxing, string 'hello' wraped and became special object automatically
    // auto-boxing works with other values like numbers and booleans.
    // but not on undefined and null..

    console.log('hello'.toUpperCase());

    // Object are refrences.

    const object1 = {
      message : 'hello'
    };

    const object2 = object1; // it doesn't create a new copy but only point on the same address in the memory as object1.

    object1.message = 'good job!';
    console.log(object1);
    console.log(object2); 

    // const prevents a variable from being reassigned to a new reference, but it does not prevent modifying the contents of the object or array it references.

    const object3 = {
      message : 'good job!'
    };
    console.log(object3 === object1); // compares the refrences not the value inside...
    console.log(object2 === object1);

    const object4  = {
      message : 'good job!',
      price: 799
    };

    // const message = object4.message;
    const { message, price } = object4; // this shortcut is called destructuring.

    console.log(price);




    // shorthand property ...

    const object5 = {
      // message: message
      message, // shorthand property ... when the property and value have same name we can just write the name once.
